name: Deploy to Truehost

on:
  push:
    branches:
      - main  # Triggers when you push to main branch

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.1
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/  # Upload files to public_html folder
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .vscode/**
            Logosphere CMS/**
